<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot</title>
  <style>
    /* Reset margins, padding, and box-sizing to avoid issues */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body styles */
    body {
      font-family: Helvetica, sans-serif;
      font-size: 16px;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f4f4f4;
      overflow: hidden;
    }

    /* Chat window styles */
    #chat-window {
      flex-grow: 1;
      width: 100%;
      max-width: 800px;
      margin-bottom: 50px;
      border: 1px solid #ccc;
      background-color: #fff;
      padding: 20px;
      box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 50px);
      position: relative;
    }

    #chat-window .message {
      display: flex;
      margin-bottom: 10px;
      max-width: 100%;
    }

    #chat-window .message p {
      margin: 0;
      padding: 10px 15px;
      border-radius: 20px;
      word-wrap: break-word;
      display: inline-block;
      max-width: 80%;
    }

    /* User's message style */
    .user {
      justify-content: flex-end;
    }

    .user p {
      background-color: #f1f1f1;
      color: black;
      text-align: left;
      align-self: flex-end;
      padding: 10px 15px;
      border-radius: 20px;
    }

    /* Bot's message style */
    .bot {
      justify-content: flex-start;
    }

    .bot p {
      color: black;
      text-align: left;
      padding: 10px 15px;
      border-radius: 20px;
      word-wrap: break-word;
      width: 100%;
    }

    /* Query input box at the bottom */
    #input-box {
      display: flex;
      width: 100%;
      max-width: 800px;
      position: fixed;
      bottom: 10px;
      background-color: white;
      z-index: 10;
      padding: 10px;
      justify-content: center;
    }

    #query {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    #send {
      padding: 10px 20px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #send:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <!-- Chat window -->
  <div id="chat-window"></div>

  <!-- Input box at the bottom -->
  <div id="input-box">
    <input type="text" id="query" placeholder="Type your message here..." />
    <button id="send">Send</button>
  </div>

  <script>
    const chatWindow = document.getElementById('chat-window');
    const queryInput = document.getElementById('query');
    const sendButton = document.getElementById('send');

    // Function to set the chat window height dynamically
    function setChatWindowHeight() {
      const windowHeight = window.innerHeight;
      const inputBoxHeight = document.getElementById('input-box').offsetHeight;
      const availableHeight = windowHeight - inputBoxHeight;

      // Apply the calculated height to the chat window
      chatWindow.style.height = `${availableHeight}px`;
    }

    // Call setChatWindowHeight on page load and window resize
    window.addEventListener('load', setChatWindowHeight);
    window.addEventListener('resize', setChatWindowHeight);

    // Function to convert text to bullet points if it contains lines with "-" or "*"
    function formatBulletPoints(text) {
      const lines = text.split('\n');
      const formattedText = lines.map(line => {
        if (line.trim().startsWith('-') || line.trim().startsWith('*')) {
          return `<li>${line.trim().slice(1).trim()}</li>`;
        }
        return `<p>${line}</p>`;
      }).join('');
      
      return formattedText;
    }

    // Function to add messages to the chat window
    function addMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      
      const messageBubble = document.createElement('div');
      messageBubble.className = 'message-bubble';

      const formattedMessage = formatBulletPoints(text);
      messageBubble.innerHTML = formattedMessage; 

      messageDiv.appendChild(messageBubble);
      chatWindow.appendChild(messageDiv);
      chatWindow.scrollTop = chatWindow.scrollHeight; // Auto scroll to the bottom
    }

    // Event listener for the send button
    sendButton.addEventListener('click', async () => {
      const query = queryInput.value.trim();
      if (!query) return;

      // Display user query
      addMessage(query, 'user');
      queryInput.value = ''; // Clear input

      // Send query to the server
      try {
        const response = await fetch('https://api.pannamitta.com:3000/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ query }),
        });
        const data = await response.json();

        // Display chatbot response
        addMessage(data.response, 'bot');
      } catch (error) {
        console.error('Error:', error);
        addMessage('Error connecting to chatbot server.', 'bot');
      }
    });

    // Allow sending message by pressing Enter key
    queryInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendButton.click();
      }
    });
  </script>

</body>
</html>
