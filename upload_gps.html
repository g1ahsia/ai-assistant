<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch File Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f9;
    }

    .upload-container {
      text-align: center;
      background: #ffffff;
      padding: 20px 40px;
      border-radius: 8px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      width: 400px;
    }

    input[type="file"] {
      margin: 10px 0;
      padding: 8px;
    }

    button {
      background-color: #5fa8d3;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background-color: #4b8fb1;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .progress-list {
      margin-top: 15px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
    }

    .progress-item {
      margin-bottom: 10px;
    }

    .progress-container {
      width: 100%;
      background-color: #ddd;
      border-radius: 5px;
      height: 10px;
      margin-top: 5px;
      position: relative;
    }

    .progress-bar {
      height: 10px;
      width: 0%;
      background-color: #5fa8d3;
      border-radius: 5px;
      transition: width 0.2s ease-in-out;
    }

    .file-name {
      font-size: 14px;
      display: block;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="upload-container">
    <h2>Batch File Upload</h2>
    <form id="uploadForm">
      <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.pptx" multiple required />
      <br />
      <button type="submit" id="uploadButton">Upload Files</button>
    </form>

    <div class="progress-list" id="progressList"></div>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const fileInput = document.getElementById('fileInput');
      const files = fileInput.files;
      const uploadButton = document.getElementById('uploadButton');
      const progressList = document.getElementById('progressList');

      if (files.length === 0) {
        alert('Please select files!');
        return;
      }

      uploadButton.disabled = true;
      progressList.innerHTML = "";

      const uploadPromises = [];

      for (const file of files) {
        const progressItem = document.createElement('div');
        progressItem.classList.add('progress-item');
        progressItem.innerHTML = `
          <span class="file-name">${file.name}</span>
          <div class="progress-container">
            <div class="progress-bar"></div>
          </div>
        `;
        progressList.appendChild(progressItem);

        const progressBar = progressItem.querySelector('.progress-bar');
        uploadPromises.push(uploadFile(file, progressBar));
      }

      await Promise.all(uploadPromises);

      uploadButton.disabled = false;
      alert('All files uploaded successfully!');
    });

    function uploadFile(file, progressBar) {
      return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append('file', file);

        const xhr = new XMLHttpRequest();

        xhr.upload.onprogress = (event) => {
          if (event.lengthComputable) {
            const percent = (event.loaded / event.total) * 100;
            progressBar.style.width = percent + "%";
          }
        };

        xhr.onload = () => {
          if (xhr.status === 200) {
            resolve();
          } else {
            alert(`Error uploading ${file.name}`);
            reject();
          }
        };

        xhr.onerror = () => {
          alert(`Error uploading ${file.name}`);
          reject();
        };

        xhr.open('POST', 'https://api.pannamitta.com:3001/upload', true);
        xhr.send(formData);
      });
    }
  </script>
</body>
</html>
