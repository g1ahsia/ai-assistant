<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload with Progress</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f9;
    }

    .upload-container {
      text-align: center;
      background: #ffffff;
      padding: 20px 40px;
      border-radius: 8px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      width: 350px;
    }

    input[type="file"] {
      margin: 10px 0;
      padding: 8px;
    }

    button {
      background-color: #5fa8d3;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #4b8fb1;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .progress-container {
      width: 100%;
      background-color: #ddd;
      border-radius: 5px;
      margin-top: 10px;
      display: none;
    }

    .progress-bar {
      height: 10px;
      width: 0%;
      background-color: #5fa8d3;
      border-radius: 5px;
      transition: width 0.3s;
    }

    .result {
      margin-top: 20px;
      padding: 10px;
      background-color: #f1f1f1;
      border-radius: 5px;
      max-width: 400px;
      word-wrap: break-word;
      display: none;
    }
  </style>
</head>
<body>
  <div class="upload-container">
    <h2>Upload a File</h2>
    <form id="uploadForm">
      <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.pptx" required />
      <br />
      <button type="submit" id="uploadButton">Upload</button>
    </form>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      const uploadButton = document.getElementById('uploadButton');
      const progressBar = document.getElementById('progressBar');
      const progressContainer = document.querySelector('.progress-container');
      const resultDiv = document.getElementById('result');

      if (!file) {
        alert('Please select a file!');
        return;
      }

      uploadButton.disabled = true;
      progressBar.style.width = "0%";
      progressContainer.style.display = "block";
      resultDiv.style.display = "none";

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('https://api.pannamitta.com:3001/upload', {
          method: 'POST',
          body: formData,
          headers: {},
          signal: createUploadProgressHandler(file.size, progressBar),
        });

        if (!response.ok) {
          throw new Error('Failed to upload file.');
        }

        const data = await response.json();
        resultDiv.style.display = 'block';
        resultDiv.textContent = data.message || JSON.stringify(data.parsedContent, null, 2);
      } catch (error) {
        console.error('Error:', error);
        alert('Error uploading file.');
      } finally {
        uploadButton.disabled = false;
      }
    });

    function createUploadProgressHandler(totalSize, progressBar) {
      const controller = new AbortController();
      const signal = controller.signal;

      const xhr = new XMLHttpRequest();
      xhr.upload.onprogress = (event) => {
        if (event.lengthComputable) {
          const percent = (event.loaded / totalSize) * 100;
          progressBar.style.width = percent + "%";
        }
      };

      return signal;
    }
  </script>
</body>
</html>
