<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    #chat-window {
      width: 90%;
      max-width: 600px;
      height: 70%;
      border: 1px solid #ccc;
      background: #fff;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
    }

    #chat-window .message {
      display: flex;
      margin-bottom: 10px;
      max-width: 100%; /* Ensure no overflow */
    }

    #chat-window .message p {
      margin: 0;
      padding: 10px 15px;
      border-radius: 20px;
      word-wrap: break-word;
      max-width: 70%; /* Limit width to avoid stretching too much */
    }

    .user {
      justify-content: flex-end;
    }

    .user p {
      background-color: #f1f1f1; /* Light grey for user messages */
      color: black;
    }

    .bot {
      justify-content: flex-start;
    }

    .bot p {
      background-color: #e0ffe0; /* Light green for bot messages */
      color: black;
    }

    #input-box {
      display: flex;
      width: 90%;
      max-width: 600px;
    }

    #query {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px 0 0 5px;
      outline: none;
    }

    #send {
      padding: 10px 20px;
      background: #007BFF;
      color: #fff;
      border: none;
      border-radius: 0 5px 5px 0;
      cursor: pointer;
      font-size: 16px;
    }

    #send:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div id="chat-window"></div>
  <div id="input-box">
    <input type="text" id="query" placeholder="Type your message here..." />
    <button id="send">Send</button>
  </div>

  <script>
    const chatWindow = document.getElementById('chat-window');
    const queryInput = document.getElementById('query');
    const sendButton = document.getElementById('send');

    // Add a message to the chat
    function addMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      const messageBubble = document.createElement('p');
      messageBubble.textContent = text;
      messageDiv.appendChild(messageBubble);
      chatWindow.appendChild(messageDiv);
      chatWindow.scrollTop = chatWindow.scrollHeight; // Auto-scroll to the bottom
    }

    // Event listener for the send button
    sendButton.addEventListener('click', async () => {
      const query = queryInput.value.trim();
      if (!query) return;

      // Display user query
      addMessage(query, 'user');
      queryInput.value = ''; // Clear input

      // Send query to the server
      try {
        const response = await fetch('https://54.221.145.150:3000/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ query }),
        });
        const data = await response.json();

        // Display chatbot response
        addMessage(data.response, 'bot');
      } catch (error) {
        console.error('Error:', error);
        addMessage('Error connecting to chatbot server.', 'bot');
      }
    });
  </script>
</body>
</html>
