<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    #chat-window {
      width: 90%;
      max-width: 600px;
      height: 70%;
      border: 1px solid #ccc;
      background: #fff;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
    }

    #chat-window p {
      margin: 0;
      padding: 5px;
    }

    .user {
      text-align: right;
      color: black;
    }

    .bot {
      text-align: left;
      color: black;
    }

    #input-box {
      display: flex;
      width: 90%;
      max-width: 600px;
    }

    #query {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ccc; /* Light grey border */
      border-radius: 50px;
      outline: none;
      background-color: #f1f1f1; /* Light grey background */
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Subtle shadow */
      margin-right: 10px;
    }

    #send {
      padding: 10px 20px;
      background: #007BFF;
      color: #fff;
      border: none;
      border-radius: 0 5px 5px 0;
      cursor: pointer;
      font-size: 16px;
    }

    #send:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div id="chat-window"></div>
  <div id="input-box">
    <input type="text" id="query" placeholder="Type your message here..." />
    <button id="send">Send</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
